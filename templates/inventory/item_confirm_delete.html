{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Product - ButterflyShop{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white/70 backdrop-blur-sm rounded-2xl shadow-lg p-6 text-center">
        <i class="fas fa-trash-alt text-red-500 text-5xl mb-4"></i>
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Confirm Deletion</h1>
        <p class="text-gray-600 mb-6">Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="flex gap-3 justify-center">
                <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-full transition">
                    Yes, Delete
                </button>
                <a href="{% url 'inventory:item_list' %}" class="bg-gray-300 hover:bg-gray-400 px-6 py-2 rounded-full transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
