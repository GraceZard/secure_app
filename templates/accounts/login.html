{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="flex justify-center items-center min-h-[70vh]">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">Welcome Back</h2>
        <form method="post">
            {% csrf_token %}
            <div class="space-y-4">
                {% for field in form %}
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <p class="text-red-500 text-sm mt-1">{{ field.errors|striptags }}</p>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="w-full bg-secure-primary hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition">
                    Sign In
                </button>
            </div>
        </form>
        <p class="text-center text-gray-600 mt-6">
            Don't have an account? <a href="{% url 'register' %}" class="text-secure-primary hover:underline">Register</a>
        </p>
    </div>
</div>
{% endblock %}
