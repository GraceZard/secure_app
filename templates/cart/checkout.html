{% extends 'base.html' %}
{% block title %}Checkout{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-purple-700 mb-6">Checkout</h1>
    <div class="bg-white rounded-xl shadow-md p-6">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary text-white px-6 py-2 rounded-full mt-4">Place Order</button>
        </form>
    </div>
</div>
{% endblock %}
